name: MedicationApp
options:
  bundleIdPrefix: com.afterlifearchive
  developmentLanguage: ja
configs:
  Debug: debug
  Staging: release
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.2
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    DEVELOPMENT_LANGUAGE: ja
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  MedicationApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: Shared
      - path: Networking
      - path: Services
      - path: Assets.xcassets
      - path: Resources
      - path: GoogleService-Info.plist
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: firebase-ios-sdk
        product: FirebaseAnalyticsCore
    info:
      path: App/Info.plist
      properties:
        API_BASE_URL: "$(API_BASE_URL)"
        EMAIL_CONFIRMATION_REDIRECT_URL: "$(EMAIL_CONFIRMATION_REDIRECT_URL)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
        FIREBASE_ANALYTICS_COLLECTION_ENABLED: false
        GOOGLE_ANALYTICS_IDFV_COLLECTION_ENABLED: false
        GOOGLE_ANALYTICS_DEFAULT_ALLOW_AD_PERSONALIZATION_SIGNALS: false
        FirebaseAutomaticScreenReportingEnabled: false
        CFBundleDisplayName: "$(APP_DISPLAY_NAME)"
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
        CFBundleURLTypes:
          - CFBundleURLName: com.afterlifearchive.medmanager
            CFBundleURLSchemes:
              - okusurimimamori
        UILaunchStoryboardName: "LaunchScreen"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: App/MedicationApp.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:okusuri-mimamori.com
          - applinks:www.okusuri-mimamori.com
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afterlifearchive.medmanager
        DEVELOPMENT_TEAM: QSZR732YXD
        CURRENT_PROJECT_VERSION: 38
        MARKETING_VERSION: 1.0.4
        APP_DISPLAY_NAME: "お薬見守り"
        API_BASE_URL: "https://www.okusuri-mimamori.com/"
        EMAIL_CONFIRMATION_REDIRECT_URL: "https://www.okusuri-mimamori.com/auth/confirmed"
        SUPABASE_URL: "https://gnsnasheyrncfbbnbomh.supabase.co"
        SUPABASE_ANON_KEY: "sb_publishable_7hGwwBAmU55gsNVbMw8IAg_KgS2GyaM"
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Staging:
          APS_ENVIRONMENT: production
          ENABLE_TESTABILITY: true
          APP_DISPLAY_NAME: "お薬見守り Staging"
          API_BASE_URL: "https://staging-api.okusuri-mimamori.com/"
          SUPABASE_URL: "https://kairaeahklftpjfcaddh.supabase.co"
          SUPABASE_ANON_KEY: "sb_publishable_nVf6RMV1tUkg8ew7BJLVnw_YDnUMRra"
        Release:
          APS_ENVIRONMENT: production
    scheme:
      storeKitConfiguration: App/Products.storekit
      testTargets:
        - MedicationAppTests
        - MedicationAppUITests
  MedicationAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "HistoryOverlayTests.swift"
          - "**/*UITests.swift"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleVersion: "18"
    dependencies:
      - target: MedicationApp
  MedicationAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests
        includes:
          - "HistoryOverlayTests.swift"
          - "**/*UITests.swift"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleVersion: "18"
    dependencies:
      - target: MedicationApp
schemes:
  MedicationApp-Staging:
    build:
      targets:
        MedicationApp: all
    run:
      config: Staging
      storeKitConfiguration: App/Products.storekit
    test:
      config: Staging
      targets:
        - MedicationAppTests
        - MedicationAppUITests
    profile:
      config: Staging
    analyze:
      config: Staging
    archive:
      config: Staging
