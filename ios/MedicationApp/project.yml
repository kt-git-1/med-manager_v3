name: MedicationApp
options:
  bundleIdPrefix: com.afterlifearchive
settings:
  base:
    SWIFT_VERSION: 6.2
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  MedicationApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: Shared
      - path: Networking
      - path: Services
      - path: Assets.xcassets
      - path: Resources
      - path: GoogleService-Info.plist
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseMessaging
    info:
      path: App/Info.plist
      properties:
        API_BASE_URL: "https://okusuri-mimamori.com/"
        SUPABASE_URL: "https://kairaeahklftpjfcaddh.supabase.co"
        SUPABASE_ANON_KEY: "sb_publishable_nVf6RMV1tUkg8ew7BJLVnw_YDnUMRra"
        CFBundleDisplayName: "お薬見守り"
        CFBundleURLTypes:
          - CFBundleURLName: com.afterlifearchive.medmanager
            CFBundleURLSchemes:
              - okusurimimamori
        UILaunchStoryboardName: "LaunchScreen"
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: App/MedicationApp.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:okusuri-mimamori.com
          - applinks:www.okusuri-mimamori.com
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afterlifearchive.medmanager
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    scheme:
      storeKitConfiguration: App/Products.storekit
      testTargets:
        - MedicationAppTests
  MedicationAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    info:
      path: Tests/Info.plist
    dependencies:
      - target: MedicationApp
