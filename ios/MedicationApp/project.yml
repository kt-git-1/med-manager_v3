name: MedicationApp
options:
  bundleIdPrefix: com.afterlifearchive
  developmentLanguage: ja
settings:
  base:
    SWIFT_VERSION: 6.2
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    DEVELOPMENT_LANGUAGE: ja
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  MedicationApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: Shared
      - path: Networking
      - path: Services
      - path: Assets.xcassets
      - path: Resources
      - path: GoogleService-Info.plist
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: firebase-ios-sdk
        product: FirebaseAnalyticsCore
    info:
      path: App/Info.plist
      properties:
        API_BASE_URL: "https://www.okusuri-mimamori.com/"
        EMAIL_CONFIRMATION_REDIRECT_URL: "https://www.okusuri-mimamori.com/auth/confirmed"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUPABASE_URL: "https://gnsnasheyrncfbbnbomh.supabase.co"
        SUPABASE_ANON_KEY: "sb_publishable_7hGwwBAmU55gsNVbMw8IAg_KgS2GyaM"
        FIREBASE_ANALYTICS_COLLECTION_ENABLED: false
        GOOGLE_ANALYTICS_IDFV_COLLECTION_ENABLED: false
        GOOGLE_ANALYTICS_DEFAULT_ALLOW_AD_PERSONALIZATION_SIGNALS: false
        FirebaseAutomaticScreenReportingEnabled: false
        CFBundleDisplayName: "お薬見守り"
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
        CFBundleURLTypes:
          - CFBundleURLName: com.afterlifearchive.medmanager
            CFBundleURLSchemes:
              - okusurimimamori
        UILaunchStoryboardName: "LaunchScreen"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: App/MedicationApp.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:okusuri-mimamori.com
          - applinks:www.okusuri-mimamori.com
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afterlifearchive.medmanager
        DEVELOPMENT_TEAM: QSZR732YXD
        CURRENT_PROJECT_VERSION: 28
        MARKETING_VERSION: 1.0.2
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    scheme:
      storeKitConfiguration: App/Products.storekit
      testTargets:
        - MedicationAppTests
        - MedicationAppUITests
  MedicationAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "HistoryOverlayTests.swift"
          - "**/*UITests.swift"
    info:
      path: Tests/Info.plist
    dependencies:
      - target: MedicationApp
  MedicationAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests
        includes:
          - "HistoryOverlayTests.swift"
          - "**/*UITests.swift"
    info:
      path: Tests/Info.plist
    dependencies:
      - target: MedicationApp
